name: Release

on:
  push:
    tags:
      - 'v*'           # z.B. v1.2.3

permissions:
  contents: write       # notwendig zum Erstellen des Releases

jobs:
  test:
    name: Test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3', '8.4']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install deps
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: vendor/bin/phpunit --colors=always

  build:
    name: Build dist
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history (für git archive)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make dist zip (export-ignore respektiert .gitattributes)
        run: |
          TAG="${GITHUB_REF_NAME}"                            # z.B. v1.2.3
          OUT="smartdesk-debuglogger-${TAG}.zip"
          git archive --format=zip \
            --prefix="SmartDesk-DebugLogger/" "${TAG}" \
            -o "${OUT}"
          echo "ASSET=${OUT}" >> $GITHUB_ENV

      - name: Upload artifact (zwischen Job-Schritten)
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Create release with asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            smartdesk-debuglogger-*.zip
